name: Plugin review request
description: Request a privacy & security review for a design plugin or asset.
title: "Review request: "
labels: ["review-request"]
body:
  - type: input
    id: plugin-name
    attributes:
      label: Plugin name
    validations:
      required: true
  - type: dropdown
    id: platform
    attributes:
      label: Platform
      options:
        - Figma
        - FigJam
        - Framer
        - Other
    validations:
      required: true
  - type: input
    id: plugin-url
    attributes:
      label: Plugin URL
      placeholder: "https://…"
    validations:
      required: true
  - type: textarea
    id: reason
    attributes:
      label: Reason for request
      description: Why should this plugin be reviewed?
    validations:
      required: true
  - type: textarea
    id: notes
    attributes:
      label: Notes
      description: Anything you already know about its data handling.
